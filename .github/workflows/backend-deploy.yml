name: Deploy Backend to OKE

on:
  push:
    branches: [master]
    paths:
      - "backend/**"

env:
  IMAGE: ${{ secrets.OCI_REGION_KEY }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/librefractals/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        run: |
          echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login \
            ${{ secrets.OCI_REGION_KEY }}.ocir.io \
            -u "${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_EMAIL }}" \
            --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend/
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create OCIR pull secret
        run: |
          kubectl create secret docker-registry ocir-secret \
            --docker-server="${{ secrets.OCI_REGION_KEY }}.ocir.io" \
            --docker-username="${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_EMAIL }}" \
            --docker-password="${{ secrets.OCI_AUTH_TOKEN }}" \
            --docker-email="${{ secrets.OCI_EMAIL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: kubectl apply -f backend/k8s/

      - name: Update image in deployment
        run: |
          kubectl set image deployment/librefractals-backend \
            backend=$IMAGE:${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/librefractals-backend --timeout=120s
