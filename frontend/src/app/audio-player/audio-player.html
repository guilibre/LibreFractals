<div class="player">
  <div class="controls">
    <button class="play-btn" (click)="togglePlay()">
      @if (playing()) {
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <rect x="4" y="2" width="5" height="20" rx="1" />
          <rect x="15" y="2" width="5" height="20" rx="1" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <polygon points="4,2 20,12 4,22" />
        </svg>
      }
    </button>
    <button class="stop-btn" (click)="stopAndReset()" [disabled]="duration() === 0">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <rect x="4" y="4" width="16" height="16" rx="1" />
      </svg>
    </button>
    <span class="time">{{ formatTime(currentTime()) }} / {{ formatTime(duration()) }}</span>
  </div>
  <div class="spectrogram-wrap" (click)="seek($event)" (touchstart)="seekTouch($event)" style="cursor: pointer">
    <canvas #canvas></canvas>
    <div #playheadLine class="playhead-line"></div>
    @if (!spectrogramReady()) {
      <div class="spectrogram-loading">Computing spectrogram...</div>
    }
  </div>
</div>
