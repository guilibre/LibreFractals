apiVersion: apps/v1
kind: Deployment
metadata:
  name: librefractals-backend
  labels:
    app: librefractals-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: librefractals-backend
  template:
    metadata:
      labels:
        app: librefractals-backend
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: backend
          # Substituir pelos valores reais da sua tenancy OCI:
          # <region-key>.ocir.io/<tenancy-namespace>/librefractals/backend:latest
          image: <region-key>.ocir.io/<tenancy-namespace>/librefractals/backend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
